<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ECENTRA Magazine</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- use CDN for turn.js; local file is empty -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>

body{
margin:0;
background:#0d1117;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
color:white;
font-family:Arial;
}

#book{
width:90vw;
height:65vh;
max-width:900px;
max-height:600px;
box-shadow:0 25px 60px rgba(0,0,0,0.8);
border-radius:8px;
overflow:hidden;
}

#book div{
width:100%;
height:100%;
}

#book img{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

.controls{
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
background:#58a6ff;
color:white;
cursor:pointer;
}

@media (max-width:768px){

#book{
width:95vw;
height:70vh;
}

button{
padding:8px 12px;
font-size:12px;
}

h2{
font-size:16px;
}

}

</style>
</head>
<body>
    <div id="book"></div>
    <div class="controls">
        <button id="prev">Previous</button>
        <button id="next">Next</button>
    </div>

    <script>
        // initialize the flipbook when DOM is ready
        $(document).ready(function() {
                var $book = $("#book");
            var totalPages = 74; // match number of files in pages/

            // add all page elements before turning
            for (var i = 1; i <= totalPages; i++) {
                $book.append(
                    '<div><img src="pages/page' + i + '.jpg" alt="Page ' + i + '"/></div>'
                );
            }
            console.log('appended', $book.children().length, 'pages');

            // initialize the flipbook container after pages exist
            if (typeof $book.turn === 'function') {
                $book.turn({
                    width: '100%',
                    height: '100%',
                    autoCenter: true
                });
            } else {
                console.error('turn.js not available');
            }

            // controls
            $('#prev').on('click', function() {
                $book.turn('previous');
            });
            $('#next').on('click', function() {
                $book.turn('next');
            });
        });
    </script>
</body>
</html>
