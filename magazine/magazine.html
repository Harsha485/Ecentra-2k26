<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ECENTRA Magazine</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>

body{
margin:0;
background:#0d1117;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
color:white;
font-family:Arial;
}

#book{
width:90vw;
height:65vh;
max-width:900px;
max-height:600px;
box-shadow:0 25px 60px rgba(0,0,0,0.8);
border-radius:8px;
overflow:hidden;
}

#book div{
width:100%;
height:100%;
}

#book img{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

.controls{
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
background:#58a6ff;
color:white;
cursor:pointer;
}

@media (max-width:768px){

#book{
width:95vw;
height:70vh;
}

button{
padding:8px 12px;
font-size:12px;
}

h2{
font-size:16px;
}

}

</style>
